server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php index.html;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Hide sensitive files
    location ~ /\.(htaccess|git|env|ini|log|bak|sql) {
        deny all;
        return 404;
    }

    # Block access to config directory
    location ~ ^/config/ {
        deny all;
        return 404;
    }

    # phpMyAdmin proxy
    location ^~ /phpMyAdmin {
        rewrite ^/phpMyAdmin(.*)$ $1 break;
        proxy_pass http://sanmedic-phpmyadmin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Ssl on;
    }

    # Backup location with extended timeouts
    location /backups/ {
        try_files $uri $uri/ /backups/index.php?$query_string;
        
        location ~ \.php$ {
            fastcgi_pass sanmedic-php:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_hide_header X-Powered-By;
            
            # Extended timeouts for backup (15 minutes)
            fastcgi_read_timeout 900;
            fastcgi_send_timeout 900;
            fastcgi_connect_timeout 300;
        }
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass sanmedic-php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        
        # Standard timeout (5 minutes)
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    location ~ /\.ht {
        deny all;
    }

    autoindex off;
    client_max_body_size 500M;
}
