services:
  sanmedic-db:
    image: mysql:8.0
    container_name: sanmedic-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: SanMedic_Root_2026!
      MYSQL_DATABASE: sanmedic_clinic
      MYSQL_USER: sanmedic
      MYSQL_PASSWORD: SanMedic_User_2026!
    volumes:
      - ./mysql:/var/lib/mysql
    networks:
      - sanmedic-network
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  sanmedic-php:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: sanmedic-php
    restart: unless-stopped
    environment:
      DB_HOST: sanmedic-db
      DB_NAME: sanmedic_clinic
      DB_USER: sanmedic
      DB_PASS: SanMedic_User_2026!
      APP_DEBUG: "false"
    volumes:
      - ./public:/var/www/html
      - ./config:/var/www/config
      - ./logs:/var/www/logs
    depends_on:
      - sanmedic-db
    networks:
      - sanmedic-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  sanmedic-nginx:
    image: nginx:alpine
    container_name: sanmedic-nginx
    restart: unless-stopped
    ports:
      - "8085:80"
      - "8445:443"
    volumes:
      - ./public:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - sanmedic-php
    networks:
      - sanmedic-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  sanmedic-certbot:
    image: certbot/certbot
    container_name: sanmedic-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - sanmedic-network

  sanmedic-phpmyadmin:
    image: phpmyadmin:latest
    container_name: sanmedic-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: sanmedic-db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 100M
      PMA_ABSOLUTE_URI: https://my.sanmedic.ge/phpMyAdmin/
    ports:
      - "8086:80"
    depends_on:
      - sanmedic-db
    networks:
      - sanmedic-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

networks:
  sanmedic-network:
    driver: bridge
